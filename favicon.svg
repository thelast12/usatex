<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#7b2fff"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.25)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- Shine overlay -->
  <rect width="64" height="32" rx="14" fill="url(#shine)"/>

  <!-- Dollar sign -->
  <text
    x="32"
    y="44"
    text-anchor="middle"
    font-family="'Sora', 'Segoe UI', Arial, sans-serif"
    font-size="38"
    font-weight="800"
    fill="#0a0f1e"
    opacity="0.9"
  >$</text>

  <!-- Small "T" accent mark top-right corner -->
  <rect x="44" y="8" width="12" height="3" rx="1.5" fill="rgba(255,255,255,0.5)"/>
  <rect x="49" y="8" width="3" height="8" rx="1.5" fill="rgba(255,255,255,0.5)"/>
</svg>
